name: AI Review

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ai-review:
    name: AI code review
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Compute diff
        id: diff
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi
          # fall back to last commit if base is empty (first push)
          if [ -z "$BASE" ] || ! git cat-file -e "$BASE" 2>/dev/null; then
            BASE="$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)"
          fi
          git diff "$BASE" "$HEAD" -- '*.ts' '*.tsx' '*.js' '*.jsx' '*.sql' > /tmp/change.diff || true
          echo "Diff size: $(wc -c < /tmp/change.diff) bytes"

      - name: Run AI review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DIFF="$(cat /tmp/change.diff)"
          export DIFF
          node scripts/ai-review.mjs
